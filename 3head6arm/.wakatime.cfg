[settings]
hostname = ONETRACK_WORKSPACE
api_key = {env:WAKATIME_API_KEY}
api_url = https://api.wakatime.com/api/v1
timeout = 30
offline = false
debug = false
status_bar_enabled = true
status_bar_coding_activity = true
status_bar_hide_categories = false
log_file = ~/.wakatime/opencode.log

[privacy]
obfuscate_file_names = true
hide_file_names = true
hide_project_folder = true
hide_project_names = true
hide_branch_names = true
include_only_with_project_file = true
exclude =
    .*node_modules[/\\].*
    .*\.git[/\\].*
    .*\.opencode[/\\].*
    .*__pycache__[/\\].*
    .*\.pyc$
    .*\.pyo$
    .*\.pyd$
    .*\.class$
    .*\.tmp$
    .*\.temp$
    .*vendor[/\\].*
    .*packages[/\\].*
    .*\.min\.js$
    .*\.min\.css$
    .*\.log$
    .*\.md$
    .*\.txt$
    .*\.json$
    .*\.jsonc$
    .*\.yaml$
    .*\.yml$
    Dockerfile
    docker-compose\.yml
    \.env.*
    \.gitignore
    README.*
    LICENSE